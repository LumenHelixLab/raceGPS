name: secret-scan

on:
  push:
  pull_request:

jobs:
  basic-secret-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block obvious committed secrets
        run: |
          ! grep -R "GOOGLE_MAPS_API_KEY=AIza" -n . || exit 1
          ! grep -R "CESIUM_ION_TOKEN=" -n . || exit 1
          ! grep -R "PRIVATE KEY" -n . || exit 1
